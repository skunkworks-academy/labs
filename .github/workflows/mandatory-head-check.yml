name: Mandatory Page Head Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-mandatory-page-head:
    name: Validate mandatory Skunkworks Academy page head
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate HTML page heads
        run: node scripts/validate-mandatory-head.js
